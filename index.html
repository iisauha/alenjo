<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#070C16">
  <title>Alenjo</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="alenjo.png">
  <script>var _v = Date.now();</script>
  <link rel="stylesheet" id="app-css">
  <script>document.getElementById('app-css').href = 'style.css?v=' + _v;</script>
</head>
<body>

  <!-- BETA GATE -->
  <div id="screen-beta" class="screen active">
    <div class="login-container">
      <img src="alenjo.png" alt="Alenjo" class="login-logo">
      <h1 class="login-title">Alenjo</h1>
      <p class="beta-label">Beta</p>
      <p class="beta-desc">This app is currently in closed beta. Enter your access code to continue.</p>
      <div id="beta-error" class="auth-error" hidden></div>
      <form id="beta-form">
        <input type="password" id="beta-pin" placeholder="Access Code" required autocomplete="off">
        <button type="submit" class="btn-primary">Enter</button>
      </form>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="screen-login" class="screen">
    <div class="login-container">
      <img src="alenjo.png" alt="Alenjo" class="login-logo">
      <h1 class="login-title">Alenjo</h1>

      <div id="auth-error" class="auth-error" hidden></div>

      <form id="auth-form" autocomplete="on">
        <input type="email" id="auth-email" placeholder="Email" required autocomplete="email">
        <input type="password" id="auth-password" placeholder="Password" required autocomplete="current-password">
        <button type="submit" id="auth-submit" class="btn-primary">Sign In</button>
      </form>

      <p class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <a href="#" id="auth-toggle-link">Sign Up</a>
      </p>
    </div>
  </div>

  <!-- SNAPSHOT SCREEN -->
  <div id="screen-snapshot" class="screen">
    <header class="app-header">
      <img src="alenjo.png" alt="Alenjo" class="header-logo">
      <h1>Snapshot</h1>
      <button id="btn-logout" class="btn-icon" title="Sign Out">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <main class="snapshot-content">
      <div id="snapshot-error" class="auth-error" hidden></div>

      <!-- Balance Toggle -->
      <button id="balance-toggle" class="balance-toggle" hidden>Current</button>

      <!-- Connect Account CTA -->
      <div id="connect-cta" class="connect-cta">
        <p>Connect your bank to get started</p>
        <button id="btn-connect-plaid" class="btn-primary">Connect Account</button>
      </div>

      <!-- Checking / Bank Accounts Section -->
      <section class="account-section" id="section-banks">
        <div class="section-header">
          <h2>Banks</h2>
          <span class="section-total" id="banks-total"></span>
        </div>
        <div class="account-list" id="list-banks"></div>
      </section>

      <!-- Savings Section -->
      <section class="account-section" id="section-savings">
        <div class="section-header">
          <h2>Savings</h2>
          <span class="section-total" id="savings-total"></span>
        </div>
        <div class="account-list" id="list-savings"></div>
      </section>

      <!-- Credit Cards Section -->
      <section class="account-section" id="section-credit">
        <div class="section-header">
          <h2>Credit Cards</h2>
          <span class="section-total" id="credit-total"></span>
        </div>
        <div class="account-list" id="list-credit"></div>
      </section>

      <button id="btn-add-account" class="btn-secondary">+ Connect Another Account</button>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="snapshot">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span>Snapshot</span>
      </button>
    </nav>
  </div>

  <!-- Loading overlay -->
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <script>
    window.onerror = function(msg, src, line) {
      var el = document.getElementById('auth-error');
      if (el) { el.textContent = 'Error: ' + msg; el.hidden = false; }
      console.error('JS Error:', msg, src, line);
    };
  </script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin="anonymous"></script>
  <script>document.write('<script src="app.js?v=' + _v + '"><\/script>');</script>
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js" async></script>
</body>
</html>
